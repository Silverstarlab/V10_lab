<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V10 Options — Sign Up</title>
<style>
  @font-face { font-family: 'Hooge'; src: url('hooge.ttf') format('truetype'); font-display: swap; }
  :root { --bg: #0a0c10; --surface: #111418; --border: #1e2530; --text: #c8d0db; --muted: #5a6478; --accent: #00c896; --mono: 'JetBrains Mono', monospace; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-container { background: var(--surface); border: 1px solid var(--border); padding: 40px; border-radius: 12px; width: 420px; text-align: center; }
  .animated-logo { font-size: 2.2rem; font-family: 'Hooge', sans-serif; background: linear-gradient(60deg, #c8d0db, #ffffff, #00c896, #4e8eff, #c8d0db); background-size: 300% 300%; -webkit-background-clip: text; background-clip: text; color: transparent; animation: shine-gradient 6s ease infinite; margin-bottom: 25px; }
  @keyframes shine-gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  .input-group { margin-bottom: 15px; text-align: left; }
  .input-group label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 0.85rem; }
  .input-group input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; }
  .btn { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
  .link-text { margin-top: 20px; font-size: 0.85rem; color: var(--muted); display: block; text-decoration: none; }
</style>
</head>
<body>
<div class="login-container">
  <div class="animated-logo">V10 OPTIONS</div>
  <div class="input-group"><label>V10 System ID</label><input type="text" id="userid" placeholder="사용할 아이디"></div>
  <div class="input-group"><label>Password</label><input type="password" id="password" placeholder="비밀번호"></div>
  <div class="input-group"><label>Alpaca API Key</label><input type="text" id="api-key" placeholder="PK..."></div>
  <div class="input-group"><label>Alpaca Secret Key</label><input type="password" id="secret-key" placeholder="••••••••"></div>
  <button class="btn" onclick="doSignup()">CREATE ACCOUNT</button>
  <a href="index.html" class="link-text">이미 계정이 있으신가요? 로그인하기</a>
</div>
<script>
async function doSignup() { window.location.href = 'index.html'; } // 현재 UI 테스트용
</script>
</body>
</html>
