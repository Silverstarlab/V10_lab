<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V10 Options — Login</title>
<style>
  @font-face {
    font-family: 'Hooge';
    src: url('hooge.ttf') format('truetype'); /* 띄어쓰기 제거된 파일명 */
    font-display: swap;
  }

  :root {
    --bg: #0a0c10; --surface: #111418; --border: #1e2530; --border2: #2a3340;
    --text: #c8d0db; --muted: #5a6478; --accent: #00c896; --red: #ff4757;
    --mono: 'JetBrains Mono', monospace; --sans: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

  .login-container { background: var(--surface); border: 1px solid var(--border); padding: 40px; border-radius: 12px; width: 400px; z-index: 1; text-align: center; }

  .animated-logo {
    font-size: 2.2rem; font-family: 'Hooge', sans-serif; letter-spacing: 1px; margin-bottom: 30px;
    background: linear-gradient(60deg, #c8d0db, #ffffff, #00c896, #4e8eff, #c8d0db);
    background-size: 300% 300%; -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: shine-gradient 6s ease infinite;
  }
  @keyframes shine-gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

  .input-group { margin-bottom: 20px; text-align: left; }
  .input-group label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.85rem; }
  .input-group input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border2); color: var(--text); border-radius: 6px; outline: none; }
  .input-group input:focus { border-color: var(--accent); }
  .login-btn { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
  .link-text { margin-top: 20px; font-size: 0.85rem; color: var(--muted); display: block; text-decoration: none; }
  .msg-box { margin-top: 20px; padding: 12px; border-radius: 6px; font-size: 0.85rem; display: none; }
</style>
</head>
<body>
<div class="login-container">
  <div class="animated-logo">V10 OPTIONS</div>
  <div class="input-group"><label>System ID</label><input type="text" id="userid" placeholder="아이디 입력" autocomplete="off"></div>
  <div class="input-group"><label>Password</label><input type="password" id="password" placeholder="비밀번호 입력" autocomplete="off"></div>
  <button class="login-btn" id="login-btn" onclick="doLogin()">CONNECT TO SERVER</button>
  <a href="signup.html" class="link-text">V10 계정이 없으신가요? 회원가입</a>
  <div id="msg-box" class="msg-box"></div>
</div>
<script>
async function doLogin() {
  const userid = document.getElementById('userid').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn = document.getElementById('login-btn');
  const box = document.getElementById('msg-box');

  if (!userid || !password) { box.style.display = 'block'; box.style.color = '#ff4757'; box.innerHTML = '⚠️ 아이디와 비밀번호를 모두 입력해주세요.'; return; }

  btn.disabled = true; btn.innerHTML = 'AUTHENTICATING...'; box.style.display = 'none';

  try {
    const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userid, password }) });
    const data = await res.json();
    if (data.ok) {
      box.style.display = 'block'; box.style.color = '#00c896'; box.innerHTML = '✅ 로그인 성공! 봇을 구동합니다...'; btn.innerHTML = 'CONNECTED';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    } else { throw new Error(data.error || '로그인 실패'); }
  } catch (err) {
    btn.disabled = false; btn.innerHTML = 'CONNECT TO SERVER';
    box.style.display = 'block'; box.style.color = '#ff4757'; box.innerHTML = `❌ 오류: 오라클 서버 연결 대기중`; // 서버 연결 전용 임시 메세지
  }
}
</script>
</body>
</html>
